<!DOCTYPE html>
<html>
<head>
  <title>Mini CRM</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { padding: 10px; margin: 10px; border: 1px solid #ccc; display: inline-block; }
  </style>
</head>
<body>

<h1>📊 Dashboard</h1>
<div id="dashboard"></div>

<h2>➕ Nuevo Cliente</h2>
<input id="empresa" placeholder="Empresa"><br>
<input id="contacto" placeholder="Contacto"><br>
<input id="email" placeholder="Email"><br>
<input id="telefono" placeholder="Teléfono"><br>
<button onclick="addClient()">Guardar</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzALg3rQJ_Yya-9mnaYqie4o40UfAyb-k97YywNsmLJnYND97XlhvMBHCBsQzz6r--X/exec";

async function loadDashboard() {
  const res = await fetch(API_URL + "?action=getDashboard");
  const data = await res.json();

  let html = "";
  for (let estado in data.estados) {
    html += `<div class="card">${estado}: ${data.estados[estado]}</div>`;
  }

  document.getElementById("dashboard").innerHTML = html;
}

async function addClient() {
  const empresa = document.getElementById("empresa").value;
  const contacto = document.getElementById("contacto").value;
  const email = document.getElementById("email").value;
  const telefono = document.getElementById("telefono").value;

  await fetch(API_URL + `?action=addClient&empresa=${empresa}&contacto=${contacto}&email=${email}&telefono=${telefono}`);

  alert("Cliente guardado");
  loadDashboard();
}

loadDashboard();
</script>

</body>
</html>
