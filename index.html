<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi CRM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f3;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #111214;
      --text2: #555d66;
      --text3: #9aa0a8;
      --accent: #0a7c4e;
      --accent-dim2: rgba(10,124,78,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 28px 24px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      text-align: center;
    }
    .header-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: flex;
      background: var(--surface);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tabs button {
      padding: 14px 20px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text2);
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }
    .tabs button.active {
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
      font-weight: 500;
    }

    .section { padding: 20px 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }
    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #085f3b; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }
    th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text3);
      text-transform: uppercase;
      padding-bottom: 8px;
      text-align: left;
    }
    td {
      background: var(--surface);
      padding: 14px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    tr td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    tr td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

    .empty { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">CRM • B2B</div>
    <h1>Mi CRM</h1>
  </div>

  <div class="tabs">
    <button onclick="showTab(0)" class="active">Dashboard</button>
    <button onclick="showTab(1)">Clientes</button>
    <button onclick="showTab(2)">Proyectos</button>
    <button onclick="showTab(3)">Actividades</button>
  </div>

  <div class="section">

    <!-- TAB 0: Dashboard -->
    <div id="tab0" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom:16px;">Resumen</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalClientes">0</div>
            <div style="font-size:13px; color:var(--text2);">Clientes</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalProyectos">0</div>
            <div style="font-size:13px; color:var(--text2);">Proyectos</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB 1: Clientes -->
    <div id="tab1" class="tab-content" style="display:none;">
      <div class="card">
        <h2 style="margin-bottom:16px;">Nuevo Cliente</h2>
        <div class="form-grid">
          <div>
            <label>Empresa</label>
            <input type="text" id="empresa" placeholder="Nombre de la empresa">
          </div>
          <div>
            <label>Contacto</label>
            <input type="text" id="contacto" placeholder="Nombre del contacto">
          </div>
          <div>
            <label>Email</label>
            <input type="email" id="email" placeholder="email@ejemplo.com">
          </div>
          <div>
            <label>Teléfono</label>
            <input type="tel" id="telefono" placeholder="(55) 1234 5678">
          </div>
        </div>
        <button onclick="agregarCliente()">Guardar Cliente</button>
      </div>

      <div class="card">
        <h2>Lista de Clientes</h2>
        <table id="tablaClientes">
          <thead><tr><th>ID</th><th>Empresa</th><th>Contacto</th><th>Email</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TAB 2: Proyectos -->
    <div id="tab2" class="tab-content" style="display:none;">
      <div class="card">
        <h2 style="margin-bottom:16px;">Nuevo Proyecto</h2>
        <div class="form-grid">
          <div>
            <label>Cliente</label>
            <select id="clienteSelect"></select>
          </div>
          <div>
            <label>Nombre del Proyecto</label>
            <input type="text" id="nombreProyecto" placeholder="Ej. Implementación Sistema">
          </div>
          <div>
            <label>Estado</label>
            <select id="estadoProyecto">
              <option value="Nuevo">Nuevo</option>
              <option value="En Proceso">En Proceso</option>
              <option value="En Pausa">En Pausa</option>
              <option value="Finalizado">Finalizado</option>
            </select>
          </div>
        </div>
        <button onclick="agregarProyecto()">Guardar Proyecto</button>
      </div>

      <div class="card">
        <h2>Proyectos Activos</h2>
        <table id="tablaProyectos">
          <thead><tr><th>ID</th><th>Cliente</th><th>Proyecto</th><th>Estado</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TAB 3: Actividades (placeholder) -->
    <div id="tab3" class="tab-content" style="display:none;">
      <div class="card">
        <h2>Actividades por Proyecto</h2>
        <p style="color:var(--text2); margin-bottom:16px;">Esta sección se completará en el siguiente paso.</p>
        <select id="proyectoSelect" style="margin-bottom:12px;" onchange="cargarActividades()"></select>
        <div id="actividadesContainer" class="empty">Selecciona un proyecto para ver actividades</div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFP_VxRIG88MMXt1H-xXvOXvKuXGPzDA3hwP1ooLPAHDczza5iBzOSN8kRswS-Vyem/exec";

    let clientes = [];
    let proyectos = [];

    async function fetchAPI(params) {
      const url = new URL(API_URL);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      const res = await fetch(url);
      return res.json();
    }

    async function postAPI(data) {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
      return res.json();
    }

    async function cargarDatos() {
      try {
        clientes = await fetchAPI({action: "getClients"});
        proyectos = await fetchAPI({action: "getProjects"});

        document.getElementById("totalClientes").textContent = clientes.length;
        document.getElementById("totalProyectos").textContent = proyectos.length;

        renderClientes();
        renderProyectos();
        llenarSelects();
      } catch(e) {
        console.error(e);
        alert("Error al conectar con el CRM. Verifica la URL del Apps Script.");
      }
    }

    function renderClientes() {
      const tbody = document.querySelector("#tablaClientes tbody");
      tbody.innerHTML = clientes.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.empresa}</td>
          <td>${c.contacto || '-'}</td>
          <td>${c.email || '-'}</td>
        </tr>
      `).join('');
    }

    function renderProyectos() {
      const tbody = document.querySelector("#tablaProyectos tbody");
      tbody.innerHTML = proyectos.map(p => {
        const cliente = clientes.find(c => c.id === p.clienteId) || {empresa: '—'};
        return `
          <tr>
            <td>${p.id}</td>
            <td>${cliente.empresa}</td>
            <td>${p.nombre}</td>
            <td>${p.estado}</td>
          </tr>
        `;
      }).join('');
    }

    function llenarSelects() {
      // Cliente select
      let html = '<option value="">Selecciona cliente...</option>';
      clientes.forEach(c => {
        html += `<option value="${c.id}">${c.empresa}</option>`;
      });
      document.getElementById("clienteSelect").innerHTML = html;

      // Proyecto select para actividades
      html = '<option value="">Selecciona proyecto...</option>';
      proyectos.forEach(p => {
        html += `<option value="${p.id}">${p.nombre}</option>`;
      });
      document.getElementById("proyectoSelect").innerHTML = html;
    }

    async function agregarCliente() {
      const empresa = document.getElementById("empresa").value.trim();
      if (!empresa) return alert("La empresa es obligatoria");

      const data = {
        action: "addClient",
        empresa: empresa,
        contacto: document.getElementById("contacto").value.trim(),
        email: document.getElementById("email").value.trim(),
        telefono: document.getElementById("telefono").value.trim()
      };

      const res = await postAPI(data);
      if (res.success) {
        alert("✅ Cliente guardado correctamente");
        document.getElementById("empresa").value = "";
        document.getElementById("contacto").value = "";
        document.getElementById("email").value = "";
        document.getElementById("telefono").value = "";
        await cargarDatos();
      }
    }

    async function agregarProyecto() {
      const clienteId = document.getElementById("clienteSelect").value;
      const nombre = document.getElementById("nombreProyecto").value.trim();
      if (!clienteId || !nombre) return alert("Selecciona un cliente y escribe el nombre del proyecto");

      const data = {
        action: "addProject",
        clienteId: clienteId,
        nombre: nombre,
        estado: document.getElementById("estadoProyecto").value
      };

      const res = await postAPI(data);
      if (res.success) {
        alert("✅ Proyecto guardado");
        document.getElementById("nombreProyecto").value = "";
        await cargarDatos();
      }
    }

    function cargarActividades() {
      const id = document.getElementById("proyectoSelect").value;
      document.getElementById("actividadesContainer").innerHTML = id 
        ? `<p style="color:var(--accent);">Actividades del proyecto seleccionado (próximamente...)</p>`
        : `<p class="empty">Selecciona un proyecto</p>`;
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
      document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab${n}`).style.display = 'block';
      document.querySelectorAll('.tabs button')[n].classList.add('active');
    }

    window.onload = cargarDatos;
  </script>
</body>
</html>
