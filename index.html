<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi CRM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f3;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #111214;
      --text2: #555d66;
      --text3: #9aa0a8;
      --accent: #0a7c4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      padding: 28px 24px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      text-align: center;
    }
    .header-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }

    .tabs {
      display: flex;
      background: var(--surface);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tabs button {
      padding: 14px 20px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text2);
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }
    .tabs button.active {
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
      font-weight: 500;
    }

    .section { padding: 20px 16px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }
    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Mono', monospace;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #085f3b; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }
    th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text3);
      text-transform: uppercase;
      padding-bottom: 8px;
      text-align: left;
    }
    td {
      background: var(--surface);
      padding: 14px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    tr td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    tr td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

    .pipeline { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
    .stage {
      min-width: 170px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stage h3 { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
    .stage-count { font-size: 28px; font-weight: 600; color: var(--accent); }

    .empty { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">CRM • B2B</div>
    <h1>Mi CRM</h1>
  </div>

  <div class="tabs">
    <button onclick="showTab(0)" class="active">Dashboard</button>
    <button onclick="showTab(1)">Clientes</button>
    <button onclick="showTab(2)">Proyectos</button>
    <button onclick="showTab(3)">Pipeline</button>
    <button onclick="showTab(4)">Actividades</button>
  </div>

  <div class="section">

    <!-- TAB 0: Dashboard -->
    <div id="tab0" class="tab-content active">
      <div class="card">
        <h2 style="margin-bottom:16px;">Resumen</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalClientes">0</div>
            <div style="font-size:13px; color:var(--text2);">Clientes</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalProyectos">0</div>
            <div style="font-size:13px; color:var(--text2);">Proyectos</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB 1: Clientes -->
    <div id="tab1" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom:16px;">Nuevo Cliente</h2>
        <div class="form-grid">
          <div><label>Empresa</label><input type="text" id="empresa" placeholder="Nombre de la empresa"></div>
          <div><label>Contacto</label><input type="text" id="contacto" placeholder="Nombre del contacto"></div>
          <div><label>Email</label><input type="email" id="email" placeholder="email@ejemplo.com"></div>
          <div><label>Teléfono</label><input type="tel" id="telefono" placeholder="(55) 1234 5678"></div>
        </div>
        <button onclick="agregarCliente()">Guardar Cliente</button>
      </div>

      <div class="card">
        <h2>Lista de Clientes</h2>
        <table id="tablaClientes">
          <thead><tr><th>ID</th><th>Empresa</th><th>Contacto</th><th>Email</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TAB 2: Proyectos -->
    <div id="tab2" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom:16px;">Nuevo Proyecto</h2>
        <div class="form-grid">
          <div><label>Cliente</label><select id="clienteSelect"></select></div>
          <div><label>Nombre del Proyecto</label><input type="text" id="nombreProyecto" placeholder="Ej. Implementación Sistema"></div>
          <div><label>Estado</label>
            <select id="estadoProyecto">
              <option value="Definición">Definición</option>
              <option value="Prueba Piloto">Prueba Piloto</option>
              <option value="Prueba Industrial">Prueba Industrial</option>
              <option value="Negociación">Negociación</option>
              <option value="Cierre">Cierre</option>
            </select>
          </div>
        </div>
        <button onclick="agregarProyecto()">Guardar Proyecto</button>
      </div>

      <div class="card">
        <h2>Proyectos</h2>
        <table id="tablaProyectos">
          <thead><tr><th>ID</th><th>Cliente</th><th>Proyecto</th><th>Estado</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TAB 3: Pipeline -->
    <div id="tab3" class="tab-content">
      <div class="card">
        <h2>Embudo de Ventas</h2>
        <div id="pipelineContainer" class="pipeline"></div>
      </div>
    </div>

    <!-- TAB 4: Actividades -->
    <div id="tab4" class="tab-content">
      <div class="card">
        <h2>Nueva Actividad</h2>
        <div class="form-grid">
          <div><label>Proyecto</label><select id="proyectoActividad"></select></div>
          <div><label>Tipo</label>
            <select id="tipoActividad">
              <option value="Llamada">Llamada</option>
              <option value="Reunión">Reunión</option>
              <option value="Email">Email</option>
              <option value="Prueba">Prueba</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div><label>Comentario</label><textarea id="comentarioAct" rows="3" placeholder="Detalles..."></textarea></div>
        </div>
        <button onclick="agregarActividad()">Guardar Actividad</button>
      </div>

      <div class="card">
        <h2>Actividades</h2>
        <select id="proyectoSelect" onchange="cargarActividades()" style="margin-bottom:12px; width:100%;"></select>
        <div id="actividadesContainer" class="empty">Selecciona un proyecto</div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFP_VxRIG88MMXt1H-xXvOXvKuXGPzDA3hwP1ooLPAHDczza5iBzOSN8kRswS-Vyem/exec";

    let clientes = [];
    let proyectos = [];

    async function fetchAPI(params) {
      const url = new URL(API_URL);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
      const res = await fetch(url);
      return res.json();
    }

    async function postAPI(data) {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
      return res.json();
    }

    async function cargarDatos() {
      try {
        clientes = await fetchAPI({action: "getClients"});
        proyectos = await fetchAPI({action: "getProjects"});

        document.getElementById("totalClientes").textContent = clientes.length;
        document.getElementById("totalProyectos").textContent = proyectos.length;

        renderClientes();
        renderProyectos();
        llenarSelects();
        renderPipeline();
      } catch (e) {
        console.error(e);
        alert("Error al conectar con la API. Revisa la consola (F12) y asegúrate de que el Apps Script esté desplegado como 'Anyone'.");
      }
    }

    function renderClientes() {
      const tbody = document.querySelector("#tablaClientes tbody");
      tbody.innerHTML = clientes.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.empresa}</td>
          <td>${c.contacto || '-'}</td>
          <td>${c.email || '-'}</td>
        </tr>
      `).join('');
    }

    function renderProyectos() {
      const tbody = document.querySelector("#tablaProyectos tbody");
      tbody.innerHTML = proyectos.map(p => {
        const cliente = clientes.find(c => c.id === p.clienteId) || {empresa: '—'};
        return `
          <tr>
            <td>${p.id}</td>
            <td>${cliente.empresa}</td>
            <td>${p.nombre}</td>
            <td>${p.estado}</td>
          </tr>
        `;
      }).join('');
    }

    function llenarSelects() {
      let htmlC = '<option value="">Selecciona cliente...</option>';
      clientes.forEach(c => htmlC += `<option value="${c.id}">${c.empresa}</option>`);
      document.getElementById("clienteSelect").innerHTML = htmlC;
      document.getElementById("proyectoActividad").innerHTML = htmlC.replace('cliente', 'proyecto');

      let htmlP = '<option value="">Selecciona proyecto...</option>';
      proyectos.forEach(p => htmlP += `<option value="${p.id}">${p.nombre}</option>`);
      document.getElementById("proyectoSelect").innerHTML = htmlP;
    }

    async function renderPipeline() {
      const data = await fetchAPI({action: "getPipeline"});
      const container = document.getElementById("pipelineContainer");
      container.innerHTML = data.stages.map(stage => `
        <div class="stage">
          <h3>${stage}</h3>
          <div class="stage-count">${data.counts[stage] || 0}</div>
        </div>
      `).join('');
    }

    async function agregarCliente() {
      const empresa = document.getElementById("empresa").value.trim();
      if (!empresa) return alert("Empresa es obligatoria");
      const data = {
        action: "addClient",
        empresa: empresa,
        contacto: document.getElementById("contacto").value.trim(),
        email: document.getElementById("email").value.trim(),
        telefono: document.getElementById("telefono").value.trim()
      };
      const res = await postAPI(data);
      if (res.success) {
        alert("✅ Cliente guardado");
        document.getElementById("empresa").value = "";
        document.getElementById("contacto").value = "";
        document.getElementById("email").value = "";
        document.getElementById("telefono").value = "";
        await cargarDatos();
      }
    }

    async function agregarProyecto() {
      const clienteId = document.getElementById("clienteSelect").value;
      const nombre = document.getElementById("nombreProyecto").value.trim();
      if (!clienteId || !nombre) return alert("Selecciona cliente y nombre del proyecto");
      const data = {
        action: "addProject",
        clienteId: clienteId,
        nombre: nombre,
        estado: document.getElementById("estadoProyecto").value
      };
      const res = await postAPI(data);
      if (res.success) {
        alert("✅ Proyecto guardado");
        document.getElementById("nombreProyecto").value = "";
        await cargarDatos();
      }
    }

    async function agregarActividad() {
      const proyectoId = document.getElementById("proyectoActividad").value;
      const tipo = document.getElementById("tipoActividad").value;
      const comentario = document.getElementById("comentarioAct").value.trim();
      if (!proyectoId || !comentario) return alert("Proyecto y comentario son obligatorios");
      const res = await postAPI({action: "addActivity", proyectoId, tipo, comentario});
      if (res.success) {
        alert("✅ Actividad guardada");
        document.getElementById("comentarioAct").value = "";
        cargarActividades();
      }
    }

    async function cargarActividades() {
      const projectId = document.getElementById("proyectoSelect").value;
      if (!projectId) return;
      const acts = await fetchAPI({action: "getActivitiesByProject", projectId: projectId});
      let html = acts.length ? acts.map(a => `
        <div style="background:var(--surface2); padding:14px; border-radius:10px; margin-bottom:10px;">
          <small>${new Date(a.fecha).toLocaleDateString()} — ${a.tipo}</small>
          <p>${a.comentario}</p>
        </div>
      `).join('') : '<p class="empty">Sin actividades aún</p>';
      document.getElementById("actividadesContainer").innerHTML = html;
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab${n}`).classList.add('active');
      document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tabs button')[n].classList.add('active');

      if (n === 3) renderPipeline();
      if (n === 4) cargarActividades();
    }

    // Iniciar
    window.onload = cargarDatos;
  </script>
</body>
</html>
