<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi CRM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f3;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #111214;
      --text2: #555d66;
      --text3: #9aa0a8;
      --accent: #0a7c4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header { padding: 28px 24px 20px; background: var(--surface); border-bottom: 1px solid var(--border2); text-align: center; }
    .header-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .header-tag::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }

    .tabs { display: flex; background: var(--surface); padding: 0 16px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tabs button {
      padding: 14px 20px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text2);
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }
    .tabs button.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: 500; }

    .section { padding: 20px 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .form-grid { display: grid; gap: 14px; }
    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Mono', monospace;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #085f3b; }

    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
    th { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; padding-bottom: 8px; text-align: left; }
    td { background: var(--surface); padding: 14px 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    tr td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    tr td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

    .pipeline { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
    .stage {
      min-width: 170px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stage h3 { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
    .stage-count { font-size: 28px; font-weight: 600; color: var(--accent); }

    .empty { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">CRM • B2B</div>
    <h1>Mi CRM</h1>
  </div>

  <div class="tabs">
    <button onclick="showTab(0)" class="active">Dashboard</button>
    <button onclick="showTab(1)">Clientes</button>
    <button onclick="showTab(2)">Proyectos</button>
    <button onclick="showTab(3)">Pipeline</button>
    <button onclick="showTab(4)">Actividades</button>
  </div>

  <div class="section">

    <!-- Dashboard -->
    <div id="tab0" class="tab-content active">
      <div class="card">
        <h2>Resumen</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;">
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalClientes">0</div>
            <div style="font-size:13px; color:var(--text2);">Clientes</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalProyectos">0</div>
            <div style="font-size:13px; color:var(--text2);">Proyectos</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Clientes, Proyectos, Pipeline y Actividades mantienen el mismo código anterior (abreviado aquí por espacio) -->
    <!-- ... (las pestañas 1,2,3,4 son idénticas a la versión que te di en el mensaje anterior) ... -->

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFP_VxRIG88MMXt1H-xXvOXvKuXGPzDA3hwP1ooLPAHDczza5iBzOSN8kRswS-Vyem/exec";

    let clientes = [];
    let proyectos = [];

    async function fetchAPI(params) {
      try {
        const url = new URL(API_URL);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        const res = await fetch(url);
        const data = await res.json();
        return data;
      } catch (e) {
        console.error("Error fetch:", e);
        return null;
      }
    }

    async function postAPI(data) {
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        return await res.json();
      } catch (e) {
        console.error("Error post:", e);
        return {success: false};
      }
    }

    async function cargarDatos() {
      try {
        clientes = await fetchAPI({action: "getClients"}) || [];
        proyectos = await fetchAPI({action: "getProjects"}) || [];

        document.getElementById("totalClientes").textContent = clientes.length;
        document.getElementById("totalProyectos").textContent = proyectos.length;

        renderClientes();
        renderProyectos();
        llenarSelects();
        renderPipeline();   // ahora es más seguro
      } catch (e) {
        console.error(e);
        alert("Error al cargar datos. Revisa la consola (F12) para más detalles.");
      }
    }

    function renderClientes() {
      const tbody = document.querySelector("#tablaClientes tbody");
      if (!tbody) return;
      tbody.innerHTML = clientes.map(c => `
        <tr><td>${c.id}</td><td>${c.empresa}</td><td>${c.contacto || '-'}</td><td>${c.email || '-'}</td></tr>
      `).join('');
    }

    function renderProyectos() {
      const tbody = document.querySelector("#tablaProyectos tbody");
      if (!tbody) return;
      tbody.innerHTML = proyectos.map(p => {
        const cliente = clientes.find(c => c.id === p.clienteId) || {empresa: '—'};
        return `<tr><td>${p.id}</td><td>${cliente.empresa}</td><td>${p.nombre}</td><td>${p.estado}</td></tr>`;
      }).join('');
    }

    function llenarSelects() {
      // Código para llenar selects (igual que antes)
      let htmlC = '<option value="">Selecciona cliente...</option>';
      clientes.forEach(c => htmlC += `<option value="${c.id}">${c.empresa}</option>`);
      const selCliente = document.getElementById("clienteSelect");
      if (selCliente) selCliente.innerHTML = htmlC;

      let htmlP = '<option value="">Selecciona proyecto...</option>';
      proyectos.forEach(p => htmlP += `<option value="${p.id}">${p.nombre}</option>`);
      const selProyecto = document.getElementById("proyectoSelect");
      if (selProyecto) selProyecto.innerHTML = htmlP;
      const selAct = document.getElementById("proyectoActividad");
      if (selAct) selAct.innerHTML = htmlC.replace('cliente', 'proyecto');
    }

    async function renderPipeline() {
      const data = await fetchAPI({action: "getPipeline"});
      const container = document.getElementById("pipelineContainer");
      if (!container) return;

      if (!data || !data.stages) {
        container.innerHTML = `<div class="empty">Error al cargar el pipeline. Verifica que el Apps Script tenga la función getPipeline.</div>`;
        return;
      }

      container.innerHTML = data.stages.map(stage => `
        <div class="stage">
          <h3>${stage}</h3>
          <div class="stage-count">${data.counts && data.counts[stage] ? data.counts[stage] : 0}</div>
        </div>
      `).join('');
    }

    // Las funciones agregarCliente, agregarProyecto, agregarActividad y cargarActividades permanecen iguales a la versión anterior

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab${n}`).classList.add('active');
      document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tabs button')[n].classList.add('active');

      if (n === 3) renderPipeline();
      if (n === 4) cargarActividades();
    }

    window.onload = cargarDatos;
  </script>
</body>
</html>
