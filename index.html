<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi CRM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f3;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #111214;
      --text2: #555d66;
      --text3: #9aa0a8;
      --accent: #0a7c4e;
      --accent-dim2: rgba(10,124,78,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      padding: 28px 24px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      text-align: center;
    }
    .header-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }

    .tabs {
      display: flex;
      background: var(--surface);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tabs button {
      padding: 14px 20px;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text2);
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }
    .tabs button.active {
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
      font-weight: 500;
    }

    .section { padding: 20px 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }
    label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Mono', monospace;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #085f3b; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }
    th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text3);
      text-transform: uppercase;
      padding-bottom: 8px;
      text-align: left;
    }
    td {
      background: var(--surface);
      padding: 14px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    tr td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    tr td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

    .pipeline {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
    }
    .stage {
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stage h3 {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }
    .stage-count {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .empty { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-tag">CRM • B2B</div>
    <h1>Mi CRM</h1>
  </div>

  <div class="tabs">
    <button onclick="showTab(0)" class="active">Dashboard</button>
    <button onclick="showTab(1)">Clientes</button>
    <button onclick="showTab(2)">Proyectos</button>
    <button onclick="showTab(3)">Pipeline</button>
    <button onclick="showTab(4)">Actividades</button>
  </div>

  <div class="section">

    <!-- Dashboard -->
    <div id="tab0" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom:16px;">Resumen</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalClientes">0</div>
            <div style="font-size:13px; color:var(--text2);">Clientes</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:32px; font-weight:600; color:var(--accent);" id="totalProyectos">0</div>
            <div style="font-size:13px; color:var(--text2);">Proyectos</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Clientes y Proyectos (mismo código anterior, abreviado por espacio) -->
    <!-- ... (mantengo las pestañas 1 y 2 iguales a la versión anterior) ... -->

    <!-- TAB 3: Pipeline -->
    <div id="tab3" class="tab-content" style="display:none;">
      <div class="card">
        <h2>Embudo de Ventas</h2>
        <div id="pipelineContainer" class="pipeline"></div>
      </div>
    </div>

    <!-- TAB 4: Actividades -->
    <div id="tab4" class="tab-content" style="display:none;">
      <div class="card">
        <h2 style="margin-bottom:16px;">Nueva Actividad</h2>
        <div class="form-grid">
          <div>
            <label>Proyecto</label>
            <select id="proyectoActividad"></select>
          </div>
          <div>
            <label>Tipo de Actividad</label>
            <select id="tipoActividad">
              <option value="Llamada">Llamada</option>
              <option value="Reunión">Reunión</option>
              <option value="Email">Email</option>
              <option value="Prueba">Prueba</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div>
            <label>Comentario</label>
            <textarea id="comentarioAct" rows="3" placeholder="Detalles de la actividad..."></textarea>
          </div>
        </div>
        <button onclick="agregarActividad()">Guardar Actividad</button>
      </div>

      <div class="card">
        <h2>Actividades del Proyecto</h2>
        <select id="proyectoSelect" onchange="cargarActividades()" style="margin-bottom:12px;"></select>
        <div id="actividadesContainer"></div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFP_VxRIG88MMXt1H-xXvOXvKuXGPzDA3hwP1ooLPAHDczza5iBzOSN8kRswS-Vyem/exec";

    let clientes = [], proyectos = [];

    // Funciones fetch y post (igual que antes)
    async function fetchAPI(params) { /* ... mismo código ... */ }
    async function postAPI(data) { /* ... mismo código ... */ }

    async function cargarDatos() {
      try {
        clientes = await fetchAPI({action: "getClients"});
        proyectos = await fetchAPI({action: "getProjects"});

        document.getElementById("totalClientes").textContent = clientes.length;
        document.getElementById("totalProyectos").textContent = proyectos.length;

        renderClientes(); // mantén tus funciones anteriores
        renderProyectos();
        llenarSelects();
        renderPipeline();
      } catch(e) { console.error(e); alert("Error de conexión"); }
    }

    // Render Pipeline
    async function renderPipeline() {
      const data = await fetchAPI({action: "getPipeline"});
      const container = document.getElementById("pipelineContainer");
      container.innerHTML = data.stages.map(stage => `
        <div class="stage">
          <h3>${stage}</h3>
          <div class="stage-count">${data.counts[stage] || 0}</div>
        </div>
      `).join('');
    }

    // Actividades
    async function agregarActividad() {
      const proyectoId = document.getElementById("proyectoActividad").value;
      const tipo = document.getElementById("tipoActividad").value;
      const comentario = document.getElementById("comentarioAct").value.trim();

      if (!proyectoId || !comentario) return alert("Selecciona proyecto y escribe comentario");

      const res = await postAPI({ action: "addActivity", proyectoId, tipo, comentario });
      if (res.success) {
        alert("✅ Actividad guardada");
        document.getElementById("comentarioAct").value = "";
        cargarActividades();
      }
    }

    async function cargarActividades() {
      const projectId = document.getElementById("proyectoSelect").value;
      if (!projectId) return;
      const acts = await fetchAPI({action: "getActivitiesByProject", projectId});
      // Render lista de actividades (puedes mejorarla después)
      let html = acts.length ? acts.map(a => `
        <div style="background:var(--surface2); padding:14px; border-radius:10px; margin-bottom:10px;">
          <small>${new Date(a.fecha).toLocaleDateString()} - ${a.tipo}</small>
          <p>${a.comentario}</p>
        </div>
      `).join('') : '<p class="empty">Sin actividades aún</p>';
      document.getElementById("actividadesContainer").innerHTML = html;
    }

    function llenarSelects() { /* actualiza los selects de cliente y proyecto */ }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      document.getElementById(`tab${n}`).style.display = 'block';
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tabs button')[n].classList.add('active');
      if (n === 3) renderPipeline();
      if (n === 4) cargarActividades();
    }

    window.onload = cargarDatos;
  </script>
</body>
</html>
